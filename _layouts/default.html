<!DOCTYPE HTML>
<html>
	<head>
		{% include head.html %}
		{{ page.extra_head }}
	</head>
	<body class="is-preload {% if page.is_home %}is-home{% endif %}">

        {% if page.is_home %}
            {% include home_overlay.html %}
        {% endif %}

		<!-- Header -->
		{% include header.html %}

		<!-- Main -->
		<div id="main">
            {{ content }}
		</div>

		<!-- Footer -->
		{% include footer.html %}

		<!-- Scripts -->
		{% include scripts.html %}
	</body>
</html>
