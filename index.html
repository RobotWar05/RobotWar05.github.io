		<script>
			// Project Media Data
			const projectMedia = {
				"PickPilot": {

					media: [
						{type: 'img', src: 'pictures/PickPilot/1_arm.jpg'},

				"Ball & Beam": {

					media: [
						{type: 'img', src: 'pictures/BallAndBeam/Beam-real.png'},
						{type: 'img', src: 'pictures/BallAndBeam/Beam-3D-SolidWorks.png'},

					media: [
						{type: 'img', src: 'pictures/WebServer_controller_robot/1.JPEG'},
						{type: 'img', src: 'pictures/WebServer_controller_robot/2.JPEG'},
						{type: 'img', src: 'pictures/WebServer_controller_robot/3_dashboard.JPEG'},
						{type: 'img', src: 'pictures/WebServer_controller_robot/4_schematic.JPEG'}
					]
				},
				"Smart Home Node": {
					thumb: "pictures/ESP32_node/1.JPEG",
					media: [
						{type: 'img', src: 'pictures/ESP32_node/1.JPEG'},

					]
				},
				"PIC16F Boards": {
					thumb: "pictures/PIC/PCB/1.JPEG",
					media: [
						{type: 'img', src: 'pictures/PIC/PCB/1_board mở rộng với pic trên altium.JPEG'},
						{type: 'img', src: 'pictures/PIC/PCB/2.JPEG'},
						{type: 'img', src: 'pictures/PIC/PCB/3.JPEG'},
						{type: 'img', src: 'pictures/PIC/PCB/4.JPEG'}
					]
				},
				"nRF24L01 Wireless": {
					thumb: "pictures/PIC/NRF24l01/1.PNG",
					media: [
						{type: 'img', src: 'pictures/PIC/NRF24l01/1.PNG'},
						{type: 'video', src: 'pictures/PIC/NRF24l01/video1.MOV'}
					]
				},
				"Leanbot Programming": {
					thumb: "pictures/Leanbot/1.JPEG",
					media: [
						{type: 'img', src: 'pictures/Leanbot/1.JPEG'},
						{type: 'video', src: 'pictures/Leanbot/video1.MP4'}
					]
				}
			};

			// Auto-wrap project images for Hover overlay and attach Modal click events
			window.initHomeScripts = function() {
				document.querySelectorAll('.proj-card').forEach(card => {
					if (card.dataset.popupBound === 'true') return;

					const titleEl = card.querySelector('h3');
					const mediaRoot = card.querySelector('.proj-img-carousel') || card.querySelector(':scope > img');
					if (!titleEl || !mediaRoot) return;

					const title = titleEl.innerText;
					let previewImg = mediaRoot.matches('img') ? mediaRoot : mediaRoot.querySelector('img');
					
					let matchedKey = Object.keys(projectMedia).find(k => title.includes(k));
					let mediaData = matchedKey ? projectMedia[matchedKey] : null;

					if (previewImg && mediaData && mediaData.thumb) {
						previewImg.src = mediaData.thumb;
						previewImg.style.objectFit = 'cover';
					}

					let clickTarget = mediaRoot;
					if (mediaRoot.matches('img')) {
						const wrap = document.createElement('div');
						wrap.className = 'proj-img-wrap';
						mediaRoot.parentNode.insertBefore(wrap, mediaRoot);
						wrap.appendChild(mediaRoot);
						clickTarget = wrap;
					} else {
						mediaRoot.classList.add('proj-img-wrap');
					}
					
					if (!clickTarget.querySelector(':scope > .proj-img-overlay')) {
						const overlay = document.createElement('div');
						overlay.className = 'proj-img-overlay';
						overlay.innerHTML = '<span class="view-btn">View</span>';
						clickTarget.appendChild(overlay);
					}

					clickTarget.addEventListener('click', () => {
						const detailsNode = card.querySelector('.proj-body').cloneNode(true);
						const modalTitleNode = detailsNode.querySelector('h3');
						let modalTitle = titleEl.childNodes[0] ? titleEl.childNodes[0].textContent.trim() : titleEl.innerText.trim();
						let modalScope = '';
						let modalDate = '';

						if (modalTitleNode) {
							const yearNode = modalTitleNode.querySelector('.yr');
							const scopeNode = modalTitleNode.querySelector('.desktop-text');
							if (yearNode) {
								modalDate = yearNode.textContent.trim();
								yearNode.remove();
							}
							if (scopeNode) {
								modalScope = scopeNode.textContent.replace(/^[\s\-+&]+/, '').trim();
								scopeNode.remove();
							}
							modalTitle = modalTitleNode.textContent.trim();
							modalTitleNode.remove();
						}

						const modalHeaderHtml = `
							<header class="modal-project-header">
								<h3 class="modal-project-title">
									<span class="modal-title-main">${modalTitle}</span>
									${modalScope ? `<span class="modal-title-scope">${modalScope}</span>` : ''}
								</h3>
								${modalDate ? `<div class="modal-project-date">${modalDate}</div>` : ''}
							</header>
						`;
						const bodyHtml = detailsNode.innerHTML;
						let slidesHtml = '';
						let dotsHtml = '';
						
						let items = [];
						if (mediaData && mediaData.media && mediaData.media.length > 0) {
							items = mediaData.media;
						} else {
							items = Array.from(card.querySelectorAll('.proj-img-carousel img, :scope > img'))
								.map(source => ({type: 'img', src: source.getAttribute('src')}))
								.filter(item => item.src);
							if (items.length === 0 && previewImg) {
								items = [{type: 'img', src: previewImg.getAttribute('src')}];
							}
						}

						items.forEach((item, index) => {
							let inner = '';
							if (item.type === 'img') {
								inner = `<img src="${item.src}" />`;
							} else if (item.type === 'video') {
								inner = `<video controls><source src="${item.src}" type="video/mp4"></video>`;
							}
							slidesHtml += `<div class="carousel-slide">${inner}</div>`;
							dotsHtml += `<div class="carousel-dot ${index === 0 ? 'active' : ''}" onclick="event.stopPropagation(); window.goToSlide(${index})"></div>`;
						});

						let controlsHtml = '';
						if (items.length > 1) {
							controlsHtml = `
								<button class="carousel-btn prev" onclick="event.stopPropagation(); window.changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
								<button class="carousel-btn next" onclick="event.stopPropagation(); window.changeSlide(1)"><i class="fas fa-chevron-right"></i></button>
								<div class="carousel-dots-container"><div class="carousel-dots">${dotsHtml}</div></div>
							`;
						}

						let actionsHtml = '';
						if (mediaData && (mediaData.github || mediaData.youtube)) {
							let buttons = '';
							if (mediaData.github) buttons += `<a href="${mediaData.github}" class="button" target="_blank"><i class="fab fa-github"></i> GitHub</a> `;
							if (mediaData.youtube) buttons += `<a href="${mediaData.youtube}" class="button primary" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>`;
							actionsHtml = `<div class="modal-actions">${buttons}</div>`;
						}

						document.getElementById('modal-content-area').innerHTML = `
  							<div class="modal-split">
  								<div class="modal-visuals" id="modal-carousel-container">
									<div class="top-bar-overlay" id="modal-top-bar"></div>
									<div class="modal-visuals-absolute" id="modal-visuals-absolute">
										<div class="carousel-track" id="modal-carousel-track">
											${slidesHtml}
										</div>
										${controlsHtml}
									</div>
  								</div>
  								<div class="modal-details">
  									${actionsHtml}
									${modalHeaderHtml}
									<div style="font-size: 1.1em; line-height: 1.8; color: #444;">
										${bodyHtml}
									</div>
								</div>
							</div>
						`;
						
						window.currentSlideIndex = 0;
						window.totalSlides = items.length;

						document.getElementById('project-modal').classList.add('active');
						document.body.classList.add('modal-open');
						// Reset track position after DOM is updated
						requestAnimationFrame(() => {
							const track = document.getElementById('modal-carousel-track');
							const trackContainer = document.getElementById('modal-carousel-container');
							if (track) {
								track.scrollTo({ left: 0 });
								
								// Native Swipe Sync
								track.addEventListener('scroll', () => {
									let newIndex = Math.round(track.scrollLeft / track.clientWidth);
									if (newIndex !== window.currentSlideIndex && newIndex >= 0 && newIndex < window.totalSlides) {
										window.currentSlideIndex = newIndex;
										window.updateCarousel(false);
									}
								}, {passive: true});
							}

							// Scroll-linked shrink header (Parallax scale)
							const split = document.querySelector('.modal-split');
							const absoluteVisuals = document.getElementById('modal-visuals-absolute');
							const topBar = document.getElementById('modal-top-bar');
							
							if (split && absoluteVisuals) {
								absoluteVisuals.style.transformOrigin = 'center center';
								absoluteVisuals.style.webkitTransformOrigin = 'center center';
								
								split.addEventListener('scroll', () => {
									if (window.innerWidth > 980) return; // Only apply on mobile
									let scrollY = split.scrollTop;
									if (scrollY < 0) scrollY = 0;
									
									// Use actual CSS layout height instead of innerHeight to prevent mobile vh bugs
									let h = absoluteVisuals.offsetHeight;
									let maxScroll = h - 50; // Text stops at 50px from top
									
									// Scale down but lock at exactly 0.4 when text reaches top bar
									let progress = Math.min(1, scrollY / maxScroll);
									let scale = Math.max(0.4, 1 - progress * 0.6);
									
									// Bypass transform-origin browser bugs by using explicit translateY math
									let heightDiff = h - (h * scale);
									let shiftY = heightDiff / 2;
									
									// Apply GPU-accelerated translate and scale
									absoluteVisuals.style.transform = `translateY(-${shiftY}px) scale(${scale})`;
									
									// Fade in top bar overlay
									if (topBar) {
										topBar.style.background = `rgba(30, 30, 30, ${progress * 0.85})`;
										topBar.style.backdropFilter = `blur(${progress * 8}px)`;
										topBar.style.webkitBackdropFilter = `blur(${progress * 8}px)`;
									}
								}, {passive: true});
							}
							
							// Edge swipe infinite loop detection
							if (trackContainer) {
								let touchStartX = 0;
								let touchStartY = 0;
								trackContainer.addEventListener('touchstart', e => {
									touchStartX = e.changedTouches[0].screenX;
									touchStartY = e.changedTouches[0].screenY;
								}, {passive: true});
								trackContainer.addEventListener('touchend', e => {
									let touchEndX = e.changedTouches[0].screenX;
									let touchEndY = e.changedTouches[0].screenY;
									let diffX = touchEndX - touchStartX;
									let diffY = touchEndY - touchStartY;
									
									// If the swipe is more vertical than horizontal, do not trigger horizontal slide
									if (Math.abs(diffY) > Math.abs(diffX)) return;
									
									if (window.totalSlides > 1) {
										if (window.currentSlideIndex === window.totalSlides - 1 && diffX < -50) {
											window.changeSlide(1);
										} else if (window.currentSlideIndex === 0 && diffX > 50) {
											window.changeSlide(-1);
										}
									}
								}, {passive: true});
							}
						});
					});

					card.dataset.popupBound = 'true';
				});

				const closeModal = () => {
					document.getElementById('project-modal').classList.remove('active');
					document.body.classList.remove('modal-open');
					// Stop videos
					document.querySelectorAll('#project-modal video').forEach(v => v.pause());
				};
				document.querySelector('.modal-close').addEventListener('click', closeModal);
				document.getElementById('project-modal').addEventListener('click', (e) => {
					if(e.target.id === 'project-modal') closeModal();
				});
				document.addEventListener('keydown', (e) => {
					if (e.key === "Escape") closeModal();
					if (e.key === "ArrowRight") { if (window.totalSlides > 1) window.changeSlide(1); }
					if (e.key === "ArrowLeft") { if (window.totalSlides > 1) window.changeSlide(-1); }
				});

				const btnGoHome = document.getElementById('btn-go-home');
				if (btnGoHome) {
					btnGoHome.addEventListener('click', function(e) {
						e.preventDefault();
						window.scrollTo({ top: 0, behavior: 'smooth' });
					});
				}
			};
		</script>

		<script>
			// Carousel global functions
			window.currentSlideIndex = 0;
			window.totalSlides = 0;

			window.updateCarousel = function(snap = true) {
				const track = document.getElementById('modal-carousel-track');
				if (!track) return;
				if (snap) {
					track.scrollTo({ left: window.currentSlideIndex * track.clientWidth, behavior: 'smooth' });
				}
				document.querySelectorAll('.carousel-dot').forEach(function(dot, i) {
					dot.classList.toggle('active', i === window.currentSlideIndex);
				});
				document.querySelectorAll('#modal-carousel-track video').forEach(function(v) { v.pause(); });
			};

			window.changeSlide = function(dir) {
				window.currentSlideIndex += dir;
				if (window.currentSlideIndex < 0) window.currentSlideIndex = window.totalSlides - 1;
				if (window.currentSlideIndex >= window.totalSlides) window.currentSlideIndex = 0;
				window.updateCarousel(true);
			};

			window.goToSlide = function(index) {
				window.currentSlideIndex = index;
				window.updateCarousel(true);
			};
		</script>

	<script>
		// Theme Toggle Logic
		(function() {
			const themes = ['theme-light', 'theme-dark', 'theme-grey'];
			let currentThemeIndex = 0;
			
			// Load saved theme
			const savedTheme = localStorage.getItem('site-theme');
			if (savedTheme && themes.includes(savedTheme)) {
				currentThemeIndex = themes.indexOf(savedTheme);
				document.body.classList.add(themes[currentThemeIndex]);
			} else {
				// Default: dark theme
				currentThemeIndex = 1; // theme-dark
				document.body.classList.add('theme-dark');
				localStorage.setItem('site-theme', 'theme-dark');
			}

			document.body.addEventListener('click', function(e) {
				const toggleBtn = e.target.closest('#theme-toggle');
				if (toggleBtn) {
					e.preventDefault();
					document.body.classList.remove(themes[currentThemeIndex]);
					currentThemeIndex = (currentThemeIndex + 1) % themes.length;
					document.body.classList.add(themes[currentThemeIndex]);
					localStorage.setItem('site-theme', themes[currentThemeIndex]);
				}
			});
		})();
	</script>
	<script src="assets/js/spa.js"></script>
